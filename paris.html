                { name: "Epicure", zone: "第8區", rating: "4.8", reviews: "1,600+", type: "米其林三星", desc: "位於 Le Bristol 酒店內。巴黎最頂級的傳統法餐殿堂之一，預算極高(€300-500+)，著裝規定極其嚴格。", url: "https://www.google.com/maps/search/?api=1&query=Epicure+Paris" },
                { name: "Du Pain et des Idées", zone: "第10區", rating: "4.5", reviews: "4,200+", type: "傳統烘焙坊", desc: "以「開心果巧克力蝸牛麵包 (Escargot)」及柴燒麵包聞名。週末公休，常態排隊。", url: "https://www.google.com/maps/search/?api=1&query=Du+Pain+et+des+Idées+Paris" },
                { name: "Cédric Grolet Opéra", zone: "第2區", rating: "4.1", reviews: "5,500+", type: "精品甜點", desc: "以極度擬真的水果雕塑甜點(Trompe-l'œil)聞名全球。排隊時間常態達1-2小時，具備極高品牌溢價。", url: "https://www.google.com/maps/search/?api=1&query=Cédric+Grolet+Opéra+Paris" },

                { name: "Le Comptoir du Relais", zone: "第6區", rating: "4.2", reviews: "2,500+", type: "新派小酒館先驅", desc: "Yves Camdeborde主理，推動了巴黎Bistronomy風潮。平日晚餐無菜單且極難預約，午餐與週末不接受預約需現場排隊。", url: "https://www.google.com/maps/search/?api=1&query=Le+Comptoir+du+Relais+Paris" },

                { key: 'ticketing', label: '票務', icon: <CreditCardIcon className="w-5 h-5" />, action: () => openView('ticketing'), active: currentView === 'ticketing' },
                { key: 'food', label: '美食', icon: <UtensilsIcon className="w-5 h-5" />, action: () => openView('food'), active: currentView === 'food' },
                { key: 'map', label: '地圖', icon: <MapIcon className="w-5 h-5" />, action: () => setIsGlobalMapOpen(prev => !prev), active: isGlobalMapOpen }
            ];

            return (
                <div className="min-h-screen mobile-app-shell">
                    <header className="bg-slate-900 text-white p-6 md:p-8 shadow-md relative print-break-inside-avoid">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-bold tracking-tight mb-2">巴黎雙人行程規劃</h1>
                                    <p className="text-slate-400 text-sm md:text-base">2026/5/14 — 2026/5/22 (8晚)</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 no-print">
                                    <button onClick={() => setIsGlobalMapOpen(true)} className="inline-flex items-center justify-center px-4 py-2 bg-blue-600 hover:bg-blue-700 border border-blue-600 rounded-lg text-sm font-medium transition-colors w-full sm:w-auto">
                                        <MapIcon className="w-4 h-4 mr-2" />
                                        總覽景點地圖
                                    </button>
                                    <a href="https://www.ratp.fr/en/plans-lignes" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-sm font-medium transition-colors w-full sm:w-auto">
                                        <MapIcon className="w-4 h-4 mr-2" />
                                        RATP 官方即時路網
                                    </a>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex flex-wrap space-x-1 bg-slate-800 p-1 rounded-lg w-full">
                                <button onClick={() => setCurrentView('overview')} className={`flex-1 py-2 px-2 text-sm font-medium rounded-md transition-colors whitespace-nowrap ${currentView === 'overview' ? 'bg-white text-slate-900 shadow' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}>
                                    <span className="flex items-center justify-center"><CalendarIcon className="w-4 h-4 mr-1.5" /> 行程總覽</span>
                                </button>
                                <button onClick={() => setCurrentView('itinerary')} className={`flex-1 py-2 px-2 text-sm font-medium rounded-md transition-colors whitespace-nowrap ${currentView === 'itinerary' ? 'bg-white text-slate-900 shadow' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}>
                                    <span className="flex items-center justify-center"><ClockIcon /> <span className="ml-1.5">每日規劃</span></span>
                                </button>
                                <button onClick={() => setCurrentView('preparation')} className={`flex-1 py-2 px-2 text-sm font-medium rounded-md transition-colors whitespace-nowrap ${currentView === 'preparation' ? 'bg-white text-slate-900 shadow' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}>
                                    <span className="flex items-center justify-center"><ClipboardIcon className="w-4 h-4 mr-1.5" /> 事前準備</span>
                                </button>
                                <button onClick={() => setCurrentView('ticketing')} className={`flex-1 py-2 px-2 text-sm font-medium rounded-md transition-colors whitespace-nowrap ${currentView === 'ticketing' ? 'bg-white text-slate-900 shadow' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}>
                                    <span className="flex items-center justify-center"><CreditCardIcon className="w-4 h-4 mr-1.5" /> 購票預約</span>
                                </button>
                                <button onClick={() => setCurrentView('food')} className={`flex-1 py-2 px-2 text-sm font-medium rounded-md transition-colors whitespace-nowrap ${currentView === 'food' ? 'bg-white text-slate-900 shadow' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}>
                                    <span className="flex items-center justify-center"><UtensilsIcon className="w-4 h-4 mr-1.5" /> 美食推薦</span>
                                </button>
                            </div>

                            <section className="md:hidden mt-4 bg-white/10 border border-white/10 rounded-2xl p-4">
                                <div className="flex items-start justify-between gap-3 mb-3">
                                    <div>
                                        <div className="text-xs font-bold text-blue-200">旅行模式 / {activeDayData.date}</div>
                                        <h2 className="text-lg font-bold mt-1">{activeDayData.title}</h2>
                                    </div>
                                    <div className="shrink-0 flex flex-col gap-2">
                                        <button onClick={showActiveDay} className="bg-white text-slate-900 text-xs font-bold px-3 py-2 rounded-lg">
                                            打開今日
                                        </button>
                                        <button onClick={() => setCurrentView('preparation')} className="bg-slate-800 text-white border border-white/10 text-xs font-bold px-3 py-2 rounded-lg">
                                            事前準備
                                        </button>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {activeDayQuickItems.map((activity, idx) => (
                                        <button key={idx} onClick={showActiveDay} className="w-full text-left bg-slate-950/30 border border-white/10 rounded-xl p-3">
                                            <div className="text-xs font-bold text-blue-200">{activity.time}</div>
                                            <div className="text-sm text-white leading-snug mt-0.5">{activity.desc}</div>
                                        </button>
                                    ))}
                                </div>
                                <p className="text-[11px] text-slate-300 leading-relaxed mt-3">
                                    iPhone 請用 Safari 開啟 HTTPS 版本，再用分享選單「加入主畫面」。
                                </p>
                            </section>
                        </div>
                    </header>

                    <GlobalMapModal isOpen={isGlobalMapOpen} onClose={closeGlobalMap} onNavigate={openView} data={tripData} />

                    <main className="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
                        {currentView === 'overview' && (
                            <OverviewView data={tripData.itinerary} onDayClick={handleDayClick} />
                        )}

                        {currentView === 'itinerary' && (
                            <div className="animate-in fade-in duration-500 space-y-8">
                                <section className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm">
                                        <div className="flex items-center space-x-2 text-slate-800 font-semibold mb-4 border-b border-slate-100 pb-2">
                                            <PlaneIcon />
                                            <h2>航班資訊 (經上海轉機)</h2>
                                        </div>
                                        <div className="space-y-4 text-sm text-slate-600">
                                            <div>
                                                <span className="font-bold text-slate-800">去程 (5/14)</span>
                                                <ul className="mt-1.5 space-y-1.5">
                                                    {tripData.logistics.flights.outbound.map((flight, idx) => (
                                                        <li key={idx} className="flex justify-between items-center">
                                                            <span>{flight.route} <span className="text-xs text-slate-400">({flight.flight})</span>:</span>
                                                            <span className="font-medium text-slate-900">{flight.time}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="border-t border-slate-100 pt-3">
                                                <span className="font-bold text-slate-800">回程 (5/22 - 5/23)</span>
                                                <ul className="mt-1.5 space-y-1.5">
                                                    {tripData.logistics.flights.inbound.map((flight, idx) => (
                                                        <li key={idx} className="flex justify-between items-center">
                                                            <span>{flight.route} <span className="text-xs text-slate-400">({flight.flight})</span>:</span>
                                                            <span className="font-medium text-slate-900">{flight.time}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white border border-slate-200 p-5 rounded-xl shadow-sm">
                                        <div className="flex items-center space-x-2 text-slate-800 font-semibold mb-4 border-b border-slate-100 pb-2">
                                            <HotelIcon />
                                            <h2>住宿資訊</h2>
                                        </div>
                                        <ul className="space-y-3 text-sm text-slate-600">
                                            <li className="flex justify-between">
                                                <span>飯店名稱:</span>
                                                <span className="font-medium text-slate-900">{tripData.logistics.hotel.name}</span>
                                            </li>
                                            <li className="flex justify-between flex-col">
                                                <span className="mb-1">地址:</span>
                                                <a href={tripData.logistics.hotel.mapUrl} target="_blank" rel="noopener noreferrer" className="font-medium text-blue-600 hover:underline inline-flex items-center">
                                                    <MapPinIcon />
                                                    {tripData.logistics.hotel.address}
                                                </a>
                                            </li>
                                            <li className="flex justify-between flex-col">
                                                <span className="mb-1">區域優勢:</span>
                                                <span className="font-medium text-slate-900">{tripData.logistics.hotel.zone}</span>
                                            </li>
                                        </ul>
                                    </div>
                                </section>

                                <section id="daily-detail">
                                    <div className="flex overflow-x-auto hide-scroll space-x-2 mb-6 pb-2 no-print">
                                        {tripData.itinerary.map((item) => (
                                            <button 
                                                key={item.day}
                                                onClick={() => setActiveDay(item.day)}
                                                className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-colors ${
                                                    activeDay === item.day 
                                                    ? 'bg-slate-900 text-white' 
                                                    : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'
                                                }`}
                                            >
                                                {`${item.date.split('(')[0].trim()}(${item.day})`}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 md:p-6 print-break-inside-avoid">
                                        {tripData.itinerary.filter(d => d.day === activeDay).map(dayData => (
                                            <div key={dayData.day}>
                                                <div className="mb-6 border-b border-slate-100 pb-4">
                                                    <h3 className="text-lg font-bold text-slate-900">{dayData.date} - {dayData.title}</h3>
                                                </div>

                                                <DaySummary dayData={dayData} />

                                                {dayData.reminders && dayData.reminders.length > 0 && (
                                                    <details className="mb-6 bg-blue-50/50 border border-blue-100 rounded-lg p-4">
                                                        <summary className="cursor-pointer text-sm font-bold text-blue-900 flex items-center list-none">
                                                            <InfoIcon /> 展開每日事實與風險提醒
                                                        </summary>
                                                        <ul className="list-disc pl-8 space-y-1.5 text-sm text-blue-800 mt-3">
                                                            {dayData.reminders.map((reminder, rIdx) => (
                                                                <li key={rIdx}>{reminder}</li>
                                                            ))}
                                                        </ul>
                                                    </details>
                                                )}

                                                <div className="space-y-0">
                                                    {dayData.activities.map((activity, idx) => (
                                                        <ActivityItem key={idx} activity={activity} />
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {currentView === 'ticketing' && (
                            <TicketingView data={tripData.ticketing} />
                        )}

                        {currentView === 'preparation' && (
                            <PreparationView data={tripData.preparation} />
                        )}

                        {currentView === 'food' && (
                            <FoodGuideView data={tripData.foodGuide} activeDayNumber={activeDay} />
                        )}
                        
                    </main>

                    <nav className="md:hidden fixed left-0 right-0 bottom-0 z-[900] bg-white/95 backdrop-blur border-t border-slate-200 mobile-bottom-nav px-2 shadow-[0_-8px_28px_rgba(15,23,42,0.12)] no-print">
                        <div className="grid grid-cols-5 gap-1">
                            {mobileNavItems.map((item) => (
                                <button
                                    key={item.key}
                                    onClick={item.action}
                                    className={`flex flex-col items-center justify-center gap-1 rounded-xl py-2 text-[11px] font-bold transition-colors ${
                                        item.active
                                            ? 'text-blue-700 bg-blue-50'
                                            : 'text-slate-500 hover:text-slate-900 hover:bg-slate-50'
                                    }`}
                                >
                                    {item.icon}
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
